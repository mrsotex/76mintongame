<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>민사친76 · 배드민턴 매칭</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Bebas+Neue&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="app">

  <!-- ── 헤더 ── -->
  <header class="header">
    <div class="logo" onclick="location.reload()" title="새로고침" style="cursor:pointer">MINSACHIN<span>76</span></div>
    <div class="header-meta">민사친76 · 배드민턴 복식 토너먼트</div>
    <div class="header-right">
      <div class="status-dot" id="status-dot"></div>
      <span class="status-label" id="status-label">로딩 중...</span>
    </div>
  </header>

  <!-- ── 사이드바 ── -->
  <nav class="sidebar">
    <div class="nav-section">
      <div class="nav-title">경기 운영</div>
      <div class="nav-item" id="nav-match" onclick="navigate('match')">
        <span class="nav-icon">🏸</span> 경기 현황
      </div>
      <div class="nav-item" id="nav-bracket" onclick="navigate('bracket')">
        <span class="nav-icon">📋</span> 대진표
        <span class="nav-badge" id="nav-badge-bracket" style="display:none"></span>
      </div>
      <div class="nav-item" id="nav-ranking" onclick="navigate('ranking')">
        <span class="nav-icon">🏆</span> 순위
      </div>
    </div>
    <div class="nav-section">
      <div class="nav-title">관리</div>
      <div class="nav-item" id="nav-teams" onclick="navigate('teams')">
        <span class="nav-icon">👥</span> 팀 / 선수 관리
      </div>
    </div>
  </nav>

  <!-- ── 메인 콘텐츠 ── -->
  <main class="main">
    <div id="view-teams"   class="view"></div>
    <div id="view-match"   class="view"></div>
    <div id="view-bracket" class="view"></div>
    <div id="view-ranking" class="view"></div>
  </main>

</div><!-- /.app -->

<!-- ── 모달 백드롭 ── -->
<div id="modal-backdrop" class="modal-backdrop" onclick="closeAllModals()"></div>

<!-- ── 팀 모달 ── -->
<div id="modal-team" class="modal">
  <div class="modal-header">
    <div class="modal-title" id="modal-team-title">팀 추가</div>
    <button class="modal-close" onclick="closeAllModals()">✕</button>
  </div>
  <div class="modal-body">
    <div class="form-group">
      <label>팀명</label>
      <input class="form-input" id="team-name-input" type="text" placeholder="팀 이름 입력">
    </div>
    <!-- 포지션: 수정 시만 표시 -->
    <div id="team-position-wrap" style="margin-top:12px; display:none">
      <div class="form-group">
        <label>대진표 포지션 (1~6)</label>
        <select class="form-select" id="team-position-input">
          <option value="">미배정</option>
          <option value="1">1번</option>
          <option value="2">2번</option>
          <option value="3">3번</option>
          <option value="4">4번</option>
          <option value="5">5번</option>
          <option value="6">6번</option>
        </select>
      </div>
    </div>
    <div id="team-auto-pos-hint" style="font-size:11px; color:var(--text-muted); margin-top:10px"></div>
  </div>
  <div class="modal-footer">
    <button class="btn-outline" onclick="closeAllModals()">취소</button>
    <button class="btn-primary" onclick="saveTeam()">저장</button>
  </div>
</div>

<!-- ── 선수 모달 ── -->
<div id="modal-player" class="modal">
  <div class="modal-header">
    <div class="modal-title" id="modal-player-title">선수 등록</div>
    <button class="modal-close" onclick="closeAllModals()">✕</button>
  </div>
  <div class="modal-body">
    <div class="form-row">
      <div class="form-group">
        <label>선수명</label>
        <input class="form-input" id="player-name-input" type="text" placeholder="이름 입력">
      </div>
      <div class="form-group">
        <label>성별</label>
        <select class="form-select" id="player-gender-input">
          <option value="male">남성 (M)</option>
          <option value="female">여성 (F)</option>
        </select>
      </div>
    </div>
    <div class="form-row" style="margin-top:8px">
      <div class="form-group">
        <label>급수</label>
        <select class="form-select" id="player-level-input">
          <option value="A">A급</option>
          <option value="B">B급</option>
          <option value="C" selected>C급</option>
          <option value="D">D급</option>
          <option value="E">E급</option>
        </select>
      </div>
      <div class="form-group">
        <label>소속 팀</label>
        <select class="form-select" id="player-team-input">
          <option value="">미배정</option>
        </select>
      </div>
    </div>
    <div style="display:flex; gap:20px; margin-top:12px">
      <label style="display:flex; align-items:center; gap:6px; cursor:pointer; font-size:13px; color:var(--text)">
        <input type="checkbox" id="player-captain-input"> 조장 ★
      </label>
      <label style="display:flex; align-items:center; gap:6px; cursor:pointer; font-size:13px; color:var(--text)">
        <input type="checkbox" id="player-guest-input"> 게스트
      </label>
    </div>
  </div>
  <div class="modal-footer">
    <button class="btn-outline" onclick="closeAllModals()">취소</button>
    <button class="btn-outline btn-danger-outline" id="btn-delete-player" onclick="deleteCurrentPlayer()" style="display:none">삭제</button>
    <button class="btn-primary" onclick="savePlayer()">저장</button>
  </div>
</div>

<!-- ── 선수 선택 모달 (수동 변경) ── -->
<div id="modal-select-player" class="modal">
  <div class="modal-header">
    <div class="modal-title" id="modal-select-title">선수 변경</div>
    <button class="modal-close" onclick="closeAllModals()">✕</button>
  </div>
  <div class="modal-body" style="max-height:360px; overflow-y:auto; padding:8px 16px;">
    <div id="player-select-list"></div>
  </div>
</div>

<!-- ── 확인 모달 ── -->
<div id="modal-confirm" class="modal">
  <div class="modal-header">
    <div class="modal-title">확인</div>
  </div>
  <div class="modal-body">
    <p id="confirm-message" style="font-size:14px; line-height:1.7; color:var(--text); white-space:pre-line"></p>
  </div>
  <div class="modal-footer">
    <button class="btn-outline" onclick="closeAllModals()">취소</button>
    <button class="btn-outline btn-danger-outline" id="btn-confirm-alt" style="display:none"></button>
    <button class="btn-primary btn-danger" id="btn-confirm-ok">확인</button>
  </div>
</div>

<!-- ── 마스터 명단 가져오기 모달 ── -->
<div id="modal-import" class="modal" style="max-width:520px">
  <div class="modal-header">
    <div class="modal-title">📋 마스터 명단 불러오기</div>
    <button class="modal-close" onclick="closeAllModals()">✕</button>
  </div>
  <div class="modal-body" style="padding:12px 16px">
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:10px">
      <span style="font-size:12px; color:var(--text-muted)" id="import-summary">로딩 중...</span>
      <label style="display:flex; align-items:center; gap:6px; font-size:12px; cursor:pointer; color:var(--text)">
        <input type="checkbox" id="import-select-all" onchange="toggleSelectAll(this.checked)"> 전체 선택
      </label>
    </div>
    <div id="import-list" style="max-height:380px; overflow-y:auto; display:flex; flex-direction:column; gap:2px"></div>
  </div>
  <div class="modal-footer">
    <button class="btn-outline" onclick="closeAllModals()">취소</button>
    <button class="btn-primary" onclick="importSelected()">선택 가져오기</button>
  </div>
</div>

<!-- ── 토스트 알림 ── -->
<div id="toast" class="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/app.js"></script>

</body>
</html>
